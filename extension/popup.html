<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PureFind</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      background: #fff;
      border-bottom: 1px solid rgba(15, 23, 42, 0.07);
      flex-shrink: 0;
    }

    .logo {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .logo .find {
      color: #6366f1;
    }

    .clear-chat {
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
    }

    .clear-chat:hover {
      color: #ef4444;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      position: relative;
    }

    /* Target follow-up state */
    .search-row.follow-up #query {
      border-color: #F59E0B;
      background: #FEF3C7;
      padding-left: 36px;
    }

    .follow-up-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #D97706;
      width: 16px;
      height: 16px;
      display: none;
      pointer-events: none;
    }

    .search-row.follow-up .follow-up-icon {
      display: block;
    }

    .search-row.follow-up #search-btn {
      background: linear-gradient(135deg, #FDE047, #F59E0B);
      color: #451A03;
    }

    .search-row.follow-up #search-btn:hover {
      background: linear-gradient(135deg, #FACC15, #D97706);
    }

    #query {
      flex: 1;
      padding: 9px 13px;
      border: 1.5px solid rgba(15, 23, 42, 0.12);
      border-radius: 10px;
      font-size: 13px;
      background: #f8fafc;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s;
    }

    #query:focus {
      border-color: #6366f1;
      background: #fff;
    }

    #query::placeholder {
      color: #94a3b8;
    }

    #search-btn {
      padding: 9px 15px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #search-btn:hover {
      background: #4f46e5;
    }

    #search-btn:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    /* ── Results area ── */
    #results {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 8px;
    }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      text-align: center;
      color: #94a3b8;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .empty-title {
      font-size: 14px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 5px;
    }

    .empty-sub {
      font-size: 12px;
      line-height: 1.5;
    }

    /* Summary */
    .summary {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #f1f5f9;
      border-radius: 8px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px;
      color: #6366f1;
      font-size: 13px;
      font-weight: 600;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #c7d2fe;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Error */
    .error-msg {
      padding: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #ef4444;
      font-size: 12px;
      font-weight: 600;
    }

    /* Product card */
    .card {
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
      transition: box-shadow 0.15s;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
    }

    .card-rank {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6366f1;
      margin-bottom: 3px;
    }

    .card-rank.top {
      color: #6366f1;
    }

    .card-rank.other {
      color: #94a3b8;
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .card-price {
      font-size: 14px;
      font-weight: 800;
      color: #ff9900;
    }

    .card-category {
      font-size: 10px;
      color: #94a3b8;
      font-weight: 600;
    }

    .card-why {
      font-size: 11px;
      color: #475569;
      line-height: 1.5;
      margin-bottom: 8px;
      font-style: italic;
    }

    .card-lists {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .card-list {
      flex: 1;
      font-size: 10.5px;
      color: #64748b;
    }

    .card-list-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .pros .card-list-label {
      color: #10b981;
    }

    .cons .card-list-label {
      color: #ef4444;
    }

    .card-list li {
      list-style: none;
      padding-left: 10px;
      position: relative;
      line-height: 1.4;
      margin-bottom: 1px;
    }

    .pros li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #10b981;
      font-weight: 700;
    }

    .cons li::before {
      content: "×";
      position: absolute;
      left: 0;
      color: #ef4444;
      font-weight: 700;
    }

    .buy-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: linear-gradient(135deg, #ff9900, #ffb03a);
      color: #111;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      transition: opacity 0.15s;
    }

    .buy-btn:hover {
      opacity: 0.88;
    }

    .buy-btn.search-amazon {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }

    /* ── Footer ── */
    .footer {
      padding: 6px 12px;
      background: #fff;
      border-top: 1px solid rgba(15, 23, 42, 0.07);
      font-size: 9px;
      color: #94a3b8;
      text-align: center;
      flex-shrink: 0;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <!-- Header with search -->
  <div class="header">
    <div class="header-top">
      <div class="logo">Pure<span class="find">Find</span> <span
          style="font-weight:400;font-size:12px;color:#94a3b8;">AI Search</span></div>
      <a class="clear-chat" id="clear-btn" style="display: none;">Reset Search</a>
    </div>
    <div class="search-row" id="search-container">
      <svg class="follow-up-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 10 4 15 9 20"></polyline>
        <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
      </svg>
      <input id="query" type="text" placeholder="What are you looking for?" autocomplete="off" />
      <button id="search-btn">Search</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="empty">
      <div class="empty-icon">✦</div>
      <div class="empty-title">AI-Powered Product Search</div>
      <div class="empty-sub">Type anything — "best headphones under $100", "quiet mechanical keyboard", "gift for a
        chef" — and get honest picks.</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">As an Amazon Associate I earn from qualifying purchases. Prices are estimates.</div>

  <script src="popup.js"></script>
</body>

</html>
